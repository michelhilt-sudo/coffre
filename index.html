<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Safe">
<meta name="theme-color" content="#0b0b0f">
<title>Safe</title>
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
  :root{
    color-scheme:light;
    --bg:#f2f2f7; --bg2:#ffffff; --card:#ffffff; --sep:#e3e3e8;
    --txt:#1c1c1e; --txt2:#8a8a8e; --txt3:#aeaeb2;
    --accent:#927000; --on-accent:#ffffff;
    --danger:#ff3b30; --field:rgba(120,120,128,.14); --key:rgba(120,120,128,.14); --nav:rgba(249,249,249,.82);
    --shadow:0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.05); --segon:#ffffff;
    --toppad:env(safe-area-inset-top); --botpad:env(safe-area-inset-bottom);
  }
  @media (prefers-color-scheme: dark){
    :root{
      color-scheme:dark;
      --bg:#000000; --bg2:#0c0c0e; --card:#1c1c1e; --sep:#2c2c2e;
      --txt:#ffffff; --txt2:#98989f; --txt3:#636366;
      --accent:#ffd21e; --on-accent:#1c1c1e;
      --danger:#ff453a; --field:rgba(120,120,128,.26); --key:rgba(120,120,128,.28); --nav:rgba(20,20,22,.82);
      --shadow:0 1px 3px rgba(0,0,0,.4); --segon:#48484a;
    }
  }
  html[data-theme="light"]{ color-scheme:light;
    --bg:#f2f2f7;--bg2:#fff;--card:#fff;--sep:#e3e3e8;--txt:#1c1c1e;--txt2:#8a8a8e;--txt3:#aeaeb2;--accent:#927000;--on-accent:#ffffff;--field:rgba(120,120,128,.14);--key:rgba(120,120,128,.14);--nav:rgba(249,249,249,.82);--shadow:0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.05);--segon:#fff;}
  html[data-theme="dark"]{ color-scheme:dark;
    --bg:#000;--bg2:#0c0c0e;--card:#1c1c1e;--sep:#2c2c2e;--txt:#fff;--txt2:#98989f;--txt3:#636366;--accent:#ffd21e;--on-accent:#1c1c1e;--field:rgba(120,120,128,.26);--key:rgba(120,120,128,.28);--nav:rgba(20,20,22,.82);--shadow:0 1px 3px rgba(0,0,0,.4);--segon:#48484a;}

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--txt);
    -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
    font-size:17px; line-height:1.35;
  }
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit;font-size:17px;}
  input,textarea,select{font-family:inherit;font-size:17px;}
  .hidden{display:none!important;}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;}

  /* ---------- App shell ---------- */
  #app{display:flex;flex-direction:column;height:100dvh;}
  header#hdr{
    padding:calc(var(--toppad) + 6px) 20px 6px; background:var(--bg);
    position:sticky;top:0;z-index:20;
  }
  .hdr-row{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;min-height:44px;}
  h1.big{font-size:34px;font-weight:800;letter-spacing:-.5px;margin:0;}
  .hdr-add{width:34px;height:34px;border-radius:50%;background:var(--accent);color:var(--on-accent);display:grid;place-items:center;font-size:22px;font-weight:400;line-height:1;}

  main#view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 16px 16px;}
  main#view::-webkit-scrollbar{display:none;}

  nav#tabs{
    display:flex;background:var(--nav);backdrop-filter:saturate(180%) blur(20px);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    border-top:.5px solid var(--sep);padding-bottom:var(--botpad);
  }
  nav#tabs button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0 6px;color:var(--txt3);font-size:10px;font-weight:500;}
  nav#tabs button.on{color:var(--accent);}
  nav#tabs svg{width:26px;height:26px;}

  /* ---------- Liste du coffre ---------- */
  .search-wrap{position:relative;margin:4px 0 12px;}
  .search-wrap input{width:100%;background:var(--field);border:0;border-radius:11px;padding:11px 14px 11px 38px;color:var(--txt);outline:none;}
  .search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:19px;height:19px;color:var(--txt3);}

  .chips-x{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .chips-x::-webkit-scrollbar{display:none;}
  .fchip{flex:none;padding:7px 14px;border-radius:20px;background:var(--field);font-size:14px;font-weight:600;color:var(--txt);}
  .fchip.on{background:var(--accent);color:var(--on-accent);}

  .list{display:flex;flex-direction:column;gap:10px;}
  .pw{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:16px;padding:11px 11px 11px 14px;box-shadow:var(--shadow);}
  .avatar{width:42px;height:42px;border-radius:12px;color:#fff;display:grid;place-items:center;font-size:19px;font-weight:700;flex:none;}
  .pwc{flex:1;min-width:0;}
  .pwn{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .pwu{font-size:13px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .cbtn{width:44px;height:44px;border-radius:12px;background:var(--field);color:var(--accent);display:grid;place-items:center;flex:none;}
  .cbtn:active{background:var(--sep);}
  .cbtn svg{width:19px;height:19px;}
  mark{background:rgba(255,204,0,.4);color:inherit;border-radius:3px;padding:0 2px;}

  .empty{text-align:center;color:var(--txt3);padding:50px 20px;}
  .empty .em{font-size:46px;margin-bottom:10px;}
  .empty p{margin:4px 0;font-size:15px;}

  /* ---------- Fiche (détail) ---------- */
  .drow{display:flex;align-items:center;gap:10px;background:var(--field);border-radius:14px;padding:12px 14px;margin-bottom:10px;}
  .dcol{flex:1;min-width:0;}
  .dl{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;}
  .dv{font-size:16px;word-break:break-all;white-space:pre-wrap;}
  .dv a{color:var(--accent);text-decoration:none;}
  .ic{width:44px;height:44px;border-radius:11px;background:var(--card);color:var(--accent);display:grid;place-items:center;flex:none;box-shadow:0 1px 2px rgba(0,0,0,.08);}
  .ic:active{opacity:.6;}
  .ic svg{width:18px;height:18px;}
  .dhead{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .dhead .avatar{width:52px;height:52px;border-radius:14px;font-size:24px;}
  .dhead .n{font-size:21px;font-weight:700;word-break:break-word;}
  .dhead .c{font-size:13px;color:var(--txt2);}
  .dfoot{text-align:center;color:var(--txt3);font-size:12px;margin:14px 0 4px;}

  /* ---------- Générateur ---------- */
  .gen-out{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:21px;line-height:1.5;word-break:break-all;background:var(--card);border-radius:16px;padding:20px 16px;box-shadow:var(--shadow);min-height:64px;text-align:center;margin:6px 0 14px;user-select:all;-webkit-user-select:all;}
  .gd{color:#0a84ff;} .gs{color:#ff9f0a;}
  .two-btn{display:flex;gap:10px;margin-bottom:22px;}
  .big-btn{display:block;flex:1;width:100%;background:var(--accent);color:var(--on-accent);font-weight:700;padding:14px;border-radius:14px;text-align:center;}
  .big-btn:active{opacity:.75;}
  .big-btn.sec{background:var(--field);color:var(--accent);}
  input[type=range]{width:100%;accent-color:var(--accent);margin:0;}

  /* ---------- Réglages ---------- */
  .grp{background:var(--card);border-radius:16px;margin:0 0 20px;overflow:hidden;box-shadow:var(--shadow);}
  .grp-h{font-size:13px;color:var(--txt2);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin:2px 6px 8px;}
  .row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:.5px solid var(--sep);min-height:50px;}
  .row:last-child{border-bottom:0;}
  .row .lbl{flex:1;}
  .row .sub{font-size:13px;color:var(--txt2);}
  .row.tap:active{background:var(--field);}
  .row .val{color:var(--txt2);}
  .row.danger .lbl{color:var(--danger);}
  .sw{width:51px;height:31px;border-radius:16px;background:var(--sep);position:relative;transition:.2s;flex:none;}
  .sw.on{background:#30d158;}
  .sw::after{content:"";position:absolute;top:2px;left:2px;width:27px;height:27px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
  .sw.on::after{left:22px;}
  select.mini{background:var(--field);border:0;border-radius:8px;padding:6px 8px;color:var(--txt);}

  /* ---------- Sheet / éditeur ---------- */
  .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:60;opacity:0;transition:.25s;}
  .sheet-bg.show{opacity:1;}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--bg2);border-radius:16px 16px 0 0;
    max-height:92dvh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);padding-bottom:var(--botpad);}
  .sheet.show{transform:translateY(0);}
  .sheet-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:.5px solid var(--sep);}
  .sheet-bar b{font-size:17px;}
  .sheet-bar button{font-size:17px;color:var(--accent);}
  .sheet-bar button.save{font-weight:700;}
  .sheet-body{overflow-y:auto;padding:16px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:13px;color:var(--txt2);font-weight:600;margin:0 2px 6px;text-transform:uppercase;letter-spacing:.3px;}
  .field input[type=text],.field textarea,.field select.full{
    width:100%;background:var(--field);border:0;border-radius:11px;padding:12px 14px;color:var(--txt);outline:none;-webkit-appearance:none;appearance:none;}
  .field textarea{min-height:90px;resize:vertical;line-height:1.45;}
  .pwd-wrap{display:flex;gap:8px;align-items:center;}
  .pwd-wrap input{flex:1;min-width:0;}
  .masked{-webkit-text-security:disc;}
  .del-btn{width:100%;text-align:center;color:var(--danger);font-weight:600;padding:14px;background:var(--card);border-radius:14px;margin-top:6px;box-shadow:var(--shadow);}
  .inline-toggle{display:flex;align-items:center;gap:10px;}
  .inline-toggle .lbl{flex:1;font-size:15px;}

  /* ---------- Écran de verrouillage ---------- */
  #lock{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(var(--toppad) + 20px) 24px calc(var(--botpad) + 20px);}
  #lock .logo{width:76px;height:76px;border-radius:20px;overflow:hidden;margin-bottom:18px;box-shadow:0 10px 30px rgba(0,0,0,.45);}
  #lock .logo img{width:100%;height:100%;display:block;}
  #lock h2{margin:0 0 6px;font-size:22px;font-weight:700;}
  #lock .hint{color:var(--txt2);font-size:15px;margin-bottom:24px;text-align:center;min-height:40px;max-width:300px;}
  #lock .hint b{color:var(--txt);}
  .dots{display:flex;gap:13px;margin-bottom:30px;min-height:15px;}
  .dots i{width:13px;height:13px;border-radius:50%;border:2px solid var(--txt2);transition:.15s;}
  .dots i.f{background:var(--accent);border-color:var(--accent);}
  .dots.err i{border-color:var(--danger);}
  .dots.err i.f{background:var(--danger);border-color:var(--danger);}
  .keypad{display:grid;grid-template-columns:repeat(3,74px);gap:18px;justify-content:center;}
  .key{width:74px;height:74px;border-radius:50%;background:var(--key);font-size:30px;font-weight:400;display:grid;place-items:center;transition:.1s;}
  .key:active{background:var(--sep);transform:scale(.94);}
  .key.fn{background:none;font-size:16px;color:var(--accent);}
  .key.bio{background:none;}
  .key.bio svg{width:34px;height:34px;color:var(--accent);}
  .lock-cancel{margin-top:24px;color:var(--accent);font-size:16px;padding:8px 16px;}
  .lock-forgot{margin-top:14px;color:var(--txt3);font-size:14px;padding:10px 16px;}
  .lock-forgot:active{color:var(--danger);}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}
  .shake{animation:shake .4s;}

  #installBanner{position:fixed;left:8px;right:8px;bottom:calc(var(--botpad) + 70px);z-index:50;background:var(--card);color:var(--txt);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow);display:flex;gap:10px;align-items:flex-start;font-size:13px;line-height:1.4;border:.5px solid var(--sep);}
  #installBanner span{flex:1;}
  #installBanner button{color:var(--txt3);font-size:22px;line-height:1;flex:none;margin-top:-3px;padding:0 2px;}

  .toast{position:fixed;left:50%;bottom:calc(var(--botpad) + 90px);transform:translateX(-50%) translateY(20px);
    background:rgba(30,30,32,.94);color:#fff;padding:11px 18px;border-radius:22px;font-size:14px;font-weight:600;
    z-index:200;opacity:0;transition:.25s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.3);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- ============ ÉCRAN DE VERROUILLAGE ============ -->
<div id="lock">
  <div class="logo"><img src="icon-192.png" alt="Safe" width="76" height="76"></div>
  <h2 id="lockTitle">Safe</h2>
  <div class="hint" id="lockHint">Entrez votre code</div>
  <div class="dots" id="dots"></div>
  <div class="keypad" id="keypad"></div>
  <button class="lock-cancel hidden" id="lockCancel">Annuler</button>
  <button class="lock-forgot hidden" id="lockForgot">Code oublié ?</button>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <header id="hdr"></header>
  <main id="view"></main>
  <nav id="tabs"></nav>
</div>

<div id="sheetRoot"></div>
<div id="installBanner" class="hidden"><span>💡 Ajoutez Safe à l'écran d'accueil (<b>Partager → Sur l'écran d'accueil</b>) pour un accès fiable hors-ligne et éviter tout effacement de vos données par Safari.</span><button id="ibClose" aria-label="Fermer">×</button></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ==================================================================
   Safe — gestionnaire de mots de passe personnel (PWA locale, 100% hors-ligne)
   Chiffrement : AES-256-GCM. La clé maître (aléatoire) chiffre les fiches ;
   elle est elle-même chiffrée ("wrappée") par une clé dérivée du code
   (PBKDF2-SHA256, 310 000 itérations). Rien n'est stocké en clair.
   Face ID (optionnel) : la clé maître est aussi wrappée par une clé AES
   non-extractible conservée dans IndexedDB, libérée après WebAuthn.
================================================================== */

/* ---------- Helpers binaire / base64 ---------- */
var te=new TextEncoder(), td=new TextDecoder();
function b64e(u8){var s='',i;for(i=0;i<u8.length;i+=0x8000)s+=String.fromCharCode.apply(null,u8.subarray(i,i+0x8000));return btoa(s);}
function b64d(str){return Uint8Array.from(atob(str),function(c){return c.charCodeAt(0);});}
function uid(){return (window.crypto&&crypto.randomUUID)?crypto.randomUUID():b64e(crypto.getRandomValues(new Uint8Array(12))).replace(/[+/=]/g,'')+Date.now().toString(16);}

/* ---------- Crypto ---------- */
var ITER=310000, PIN_LEN=6;
var cryptoOK=!!(window.crypto&&crypto.subtle&&window.isSecureContext!==false);
async function pinKeyRaw(pin,saltBytes,iter){
  var mat=await crypto.subtle.importKey('raw',te.encode('coffre:'+pin),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:saltBytes,iterations:iter,hash:'SHA-256'},mat,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
function pinKey(pin,saltB64,iter){return pinKeyRaw(pin,b64d(saltB64),iter);}
async function aEnc(key,bytes){ // -> b64(iv|ciphertext)
  var iv=crypto.getRandomValues(new Uint8Array(12));
  var ct=new Uint8Array(await crypto.subtle.encrypt({name:'AES-GCM',iv:iv},key,bytes));
  var out=new Uint8Array(12+ct.length); out.set(iv); out.set(ct,12);
  return b64e(out);
}
async function aDec(key,b64s){ // b64(iv|ct) -> Uint8Array (lève si clé/code faux)
  var buf=b64d(b64s);
  return new Uint8Array(await crypto.subtle.decrypt({name:'AES-GCM',iv:buf.subarray(0,12)},key,buf.subarray(12)));
}
function importK(raw){return crypto.subtle.importKey('raw',raw,'AES-GCM',false,['encrypt','decrypt']);}

/* ---------- Persistance ----------
   localStorage 'coffre.v1' = { v, kdf:{salt,iter}, wrapPin, data, settings, fails, lockUntil }
   `data` = fiches chiffrées ; `settings` en clair (rien de sensible). */
var KEY='coffre.v1';
// unlock : 'code' (code seul) | 'bio' (Face ID OU code) | 'both' (Face ID ET code, 2FA)
var DEFSET={autoLock:'immediate',theme:'dark',unlock:'code',faceIdCred:'',installDismissed:false,gen:{len:16,dig:true,sym:true,easy:true}};
var meta=null, corrupt=false;
var rawK=null, aesK=null, entries=[]; // en mémoire une fois déverrouillé
(function(){
  try{
    var raw=localStorage.getItem(KEY); if(!raw)return;
    var d=JSON.parse(raw);
    if(!d||!d.kdf||!d.wrapPin||typeof d.data!=='string'){corrupt=true;return;}
    var rawUnlock=d.settings&&d.settings.unlock;           // migration : ancien réglage faceId → unlock
    d.settings=Object.assign({},DEFSET,d.settings||{});
    d.settings.gen=Object.assign({},DEFSET.gen,d.settings.gen||{});
    if(!rawUnlock)d.settings.unlock=d.settings.faceId?'bio':'code';
    delete d.settings.faceId;                              // champ obsolète
    // Nouveau défaut : thème sombre (comme Carnet). Bascule l'ancien défaut 'auto' vers 'dark'
    // tant que l'utilisateur n'a pas fait de choix explicite de thème dans les Réglages.
    if(!d.settings.themeSet){ if(d.settings.theme==='auto')d.settings.theme='dark'; d.settings.themeSet=true; }
    d.fails=+d.fails||0; d.lockUntil=+d.lockUntil||0;
    meta=d;
  }catch(e){corrupt=true;}
})();
function persist(){try{localStorage.setItem(KEY,JSON.stringify(meta));return true;}catch(e){toast('Stockage plein');return false;}}
async function saveEntries(){meta.data=await aEnc(aesK,te.encode(JSON.stringify(entries)));if(!persist())throw new Error('quota');}
function S(){return meta?meta.settings:DEFSET;}
function clone(o){return JSON.parse(JSON.stringify(o));}

/* ---------- Helpers ---------- */
function pad(n){return n<10?'0'+n:''+n;}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function esc(s){return (s||'').replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
var CATS={
  identifiants:{l:'🔑 Identifiants',c:'#0a84ff'},
  cartes:{l:'💳 Cartes bancaires',c:'#30d158'},
  comptes:{l:'🏦 Comptes bancaires',c:'#5e5ce6'},
  notes:{l:'📝 Notes sécurisées',c:'#ff9f0a'},
  documents:{l:'🪪 Documents d’identité',c:'#af52de'},
  wifi:{l:'📶 Wi-Fi',c:'#32ade6'},
  licences:{l:'🧾 Licences & logiciels',c:'#8d6e63'},
  cles:{l:'🔐 Clés numériques',c:'#64d2ff'},
  crypto:{l:'🪙 Crypto / Wallets',c:'#ff375f'},
  pro:{l:'💼 Professionnel',c:'#8e8e93'},
  maison:{l:'🏠 Famille / Maison',c:'#ffb340'}
};
// Migration des anciennes catégories vers le nouveau schéma (fiches déjà enregistrées).
var CAT_MIGRATE={banque:'comptes',mail:'identifiants',achats:'identifiants',social:'identifiants',sante:'identifiants',admin:'documents',travail:'pro',autre:'identifiants'};
function normCat(c){c=(c==null?'':(''+c));return CATS[c]?c:(CAT_MIGRATE[c]||'identifiants');}
function catOf(e){return normCat(e.cat);}
function normEntry(e){
  function s(v){return v==null?'':(''+v);}
  return {id:s(e.id)||uid(),name:s(e.name),user:s(e.user),pwd:s(e.pwd),url:s(e.url),
    notes:s(e.notes),cat:normCat(e.cat),fav:!!e.fav,
    createdAt:+e.createdAt||Date.now(),updatedAt:+e.updatedAt||Date.now()};
}
function sortedEntries(list){
  return list.slice().sort(function(a,b){
    if(!!b.fav!==!!a.fav)return (b.fav?1:0)-(a.fav?1:0);
    return a.name.localeCompare(b.name,'fr',{sensitivity:'base'});
  });
}

/* ---------- Presse-papiers ---------- */
function copyTxt(t,label){
  function ok(){toast(label+' copié');}
  function ko(){toast('Copie impossible');}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(ok).catch(function(){legacyCopy(t)?ok():ko();});
  } else legacyCopy(t)?ok():ko();
}
function legacyCopy(t){

  ta.setAttribute('readonly',''); document.body.appendChild(ta);

/* ---------- Générateur de mots de passe ---------- */
function genPwd(len,o){
  var L=o.easy?'abcdefghijkmnpqrstuvwxyz':'abcdefghijklmnopqrstuvwxyz';
  var U=o.easy?'ABCDEFGHJKMNPQRSTUVWXYZ':'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  var D=o.easy?'23456789':'0123456789';
  var Y=o.easy?'!@#$%&*+-=?':'!@#$%^&*()_+-=[]{};:,.?/';
  var classes=[L,U]; if(o.dig)classes.push(D); if(o.sym)classes.push(Y);
  var pool=classes.join('');
  function rnd(n){ // entier uniforme < n (échantillonnage par rejet)
    var lim=256-(256%n),b=new Uint8Array(1);
    do{crypto.getRandomValues(b);}while(b[0]>=lim);
    return b[0]%n;
  }
  for(var tries=0;tries<64;tries++){
    var p='';
    for(var i=0;i<len;i++)p+=pool[rnd(pool.length)];
    var allOk=classes.every(function(c){
      for(var j=0;j<p.length;j++)if(c.indexOf(p[j])>=0)return true;
      return false;
    });
    if(allOk)return p;
  }
  return p; // improbable ; on rend la dernière tentative
}
function colorPwd(p){
  var h='';
  for(var i=0;i<p.length;i++){
    var ch=p[i];
    if(/[0-9]/.test(ch))h+='<span class="gd">'+ch+'</span>';
    else if(/[a-zA-Z]/.test(ch))h+=ch;
    else h+='<span class="gs">'+esc(ch)+'</span>';
  }
  return h;
}

function lockedOut(){return pinMode==='unlock'&&meta&&meta.lockUntil&&Date.now()<meta.lockUntil;}
function pinPress(k){
  if(busyPin||pinMode==='biofirst')return; // étape Face ID (avant le code) : pavé numérique inactif
  if(k==='bio'){tryFaceId();return;}
  if(lockedOut()){
    $('lockHint').textContent='Trop d’essais — attendez '+Math.ceil((meta.lockUntil-Date.now())/1000)+' s';
    return;
  }
  if(k==='back'){pinBuf=pinBuf.slice(0,-1);renderDots();return;}
  if(pinBuf.length>=PIN_LEN)return;
  pinBuf+=k; renderDots();
  if(pinBuf.length===PIN_LEN)setTimeout(pinComplete,120);
}
async function pinComplete(){
  if(busyPin)return;
  if(pinBuf.length<PIN_LEN)return; // ⌫ pressé pendant le délai : on abandonne sans valider un code partiel
  busyPin=true;
  var hint=$('lockHint');
  try{
    if(pinMode==='setup'){pinFirst=pinBuf;lockUI('setup2');return;}

    if(pinMode==='setup2'){
      if(pinBuf!==pinFirst){pinFail('Les codes ne correspondent pas');setTimeout(function(){lockUI('setup');},500);return;}
      if(meta&&rawK){ // changement de code : on re-wrappe la même clé maître
        hint.textContent='Modification…';
        await changePin(pinFirst);
        pinFirst='';
        if(pinCb){var cb=pinCb;pinCb=null;cb();}
      } else { // création initiale du coffre
        hint.textContent='Création de Safe…';
        await createVault(pinFirst);
        pinFirst='';
        toast('Safe créé — ajoutez votre 1er mot de passe');
        doUnlock();
      }
      return;
    }

    if(pinMode==='verify'){
      hint.textContent='Vérification…';
      var okV=await checkPin(pinBuf);
      if(okV){ if(pinCb){var c=pinCb;pinCb=null;c();} }
      else pinFail('Code incorrect');
      return;
    }

    if(pinMode==='import'){
      hint.textContent='Déchiffrement…';
      try{
        var r=await doImport(pinBuf,pendingImport);
        pendingImport=null; doUnlock();
        toast(r.added+' ajoutée'+(r.added>1?'s':'')+' · '+r.updated+' mise'+(r.updated>1?'s':'')+' à jour');
      }catch(e){ pinFail('Code incorrect pour cette sauvegarde'); }
      return;
    }

    // --- Déverrouillage ---
    hint.textContent='Vérification…';
    var ok=await tryUnlock(pinBuf);
    if(ok){
      meta.fails=0; meta.lockUntil=0; persist();
      clearLoginWindow();  // clôt la fenêtre 60 s du mode « Code + Face ID »
      doUnlock();          // en mode 'both', Face ID a déjà été validé AVANT le code (renderBioGate)
    }
    else{
      meta.fails=(meta.fails||0)+1;
      if(meta.fails>=5)meta.lockUntil=Date.now()+Math.min(60000,(meta.fails-4)*5000);
      persist();
      pinFail(lockedOut()?('Trop d’essais — attendez '+Math.ceil((meta.lockUntil-Date.now())/1000)+' s'):'Code incorrect');
    }
  }catch(e){
    pinFail('Erreur — réessayez');
  }finally{busyPin=false;}
}
function pinFail(msg){
  var dots=$('dots');
  dots.classList.add('err','shake');
  $('lockHint').textContent=msg;
  setTimeout(function(){dots.classList.remove('err','shake');pinBuf='';renderDots();},450);

async function createVault(pin){
  var salt=crypto.getRandomValues(new Uint8Array(16));
  rawK=crypto.getRandomValues(new Uint8Array(32));
  aesK=await importK(rawK);
  var pk=await pinKeyRaw(pin,salt,ITER);
  entries=[];
  meta={v:1,kdf:{salt:b64e(salt),iter:ITER},wrapPin:await aEnc(pk,rawK),
    data:await aEnc(aesK,te.encode('[]')),settings:clone(DEFSET),fails:0,lockUntil:0};
  persist();
}
async function tryUnlock(pin){
  var pk=await pinKey(pin,meta.kdf.salt,meta.kdf.iter);
  var k;
  try{k=await aDec(pk,meta.wrapPin);}catch(e){return false;} // code faux
  rawK=k; aesK=await importK(rawK);
  try{entries=JSON.parse(td.decode(await aDec(aesK,meta.data))).map(normEntry);}
  catch(e){entries=[];toast('⚠️ Données illisibles — restaurez une sauvegarde');}
  return true;
}
async function checkPin(pin){
  var pk=await pinKey(pin,meta.kdf.salt,meta.kdf.iter);
  try{rawK=await aDec(pk,meta.wrapPin);aesK=await importK(rawK);return true;}
  catch(e){return false;}
}
async function changePin(pin){
  var salt=crypto.getRandomValues(new Uint8Array(16));
  var pk=await pinKeyRaw(pin,salt,ITER);
  meta.kdf={salt:b64e(salt),iter:ITER};
  meta.wrapPin=await aEnc(pk,rawK);
  persist(); // le wrap Face ID (IndexedDB) reste valable : même clé maître
}

/* ----- Face ID (WebAuthn + clé de wrap non-extractible en IndexedDB) ----- */
function webauthnAvailable(){return !!(window.PublicKeyCredential&&navigator.credentials&&window.isSecureContext);}
function idb(){
  return new Promise(function(res,rej){
    var r=indexedDB.open('coffre-bio',1);
    r.onupgradeneeded=function(){r.result.createObjectStore('k',{keyPath:'id'});};
    r.onsuccess=function(){res(r.result);};
    r.onerror=function(){rej(r.error);};
  });
}
function idbPut(rec){return idb().then(function(d){return new Promise(function(res,rej){
  var t=d.transaction('k','readwrite');t.objectStore('k').put(rec);
  t.oncomplete=function(){d.close();res();};t.onerror=function(){d.close();rej(t.error);};});});}
function idbGet(id){return idb().then(function(d){return new Promise(function(res,rej){
  var g=d.transaction('k').objectStore('k').get(id);
  g.onsuccess=function(){d.close();res(g.result);};g.onerror=function(){d.close();rej(g.error);};});});}
function idbDel(id){return idb().then(function(d){return new Promise(function(res,rej){
  var t=d.transaction('k','readwrite');t.objectStore('k').delete(id);
  t.oncomplete=function(){d.close();res();};t.onerror=function(){d.close();rej(t.error);};});});}

function enrollFaceId(cb){
  if(!webauthnAvailable()){toast('Face ID indisponible ici');cb(false);return;}
  var uidBytes=new Uint8Array(16);crypto.getRandomValues(uidBytes);
  var chal=new Uint8Array(32);crypto.getRandomValues(chal);
  navigator.credentials.create({publicKey:{
    challenge:chal, rp:{name:'Safe'}, user:{id:uidBytes,name:'safe',displayName:'Safe'},
    pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-257}],
    authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},
    timeout:60000
  }}).then(function(cred){
    return crypto.subtle.generateKey({name:'AES-GCM',length:256},false,['encrypt','decrypt'])
      .then(function(wk){return aEnc(wk,rawK).then(function(wrapped){return idbPut({id:'k',key:wk,wrapped:wrapped});});})
      .then(function(){
        S().faceIdCred=b64e(new Uint8Array(cred.rawId)); persist(); cb(true);
      });
  }).catch(function(){toast('Activation annulée');cb(false);});
}
function tryFaceId(){
  if(!webauthnAvailable()||!S().faceIdCred)return;
  var chal=new Uint8Array(32);crypto.getRandomValues(chal);
  var raw=b64d(S().faceIdCred);
  navigator.credentials.get({publicKey:{
    challenge:chal, allowCredentials:[{type:'public-key',id:raw,transports:['internal']}],
    userVerification:'required', timeout:60000
  }}).then(async function(){
    if(rawK){doUnlock();return;} // clé déjà en mémoire : simple re-déverrouillage
    try{
      var rec=await idbGet('k'); if(!rec)throw 0;
      rawK=await aDec(rec.key,rec.wrapped);
      aesK=await importK(rawK);
      entries=JSON.parse(td.decode(await aDec(aesK,meta.data))).map(normEntry);
      doUnlock();
    }catch(e){rawK=null;aesK=null;toast('Utilisez votre code');}
  }).catch(function(){/* annulé */});
}

/* ----- 2e facteur (mode 'both') : Face ID exigé APRÈS le bon code ----- */
// Vérifie seulement la présence de la personne (assertion WebAuthn) ; la clé
// vient déjà du code. Résout true/false, ne lève jamais.
function assertFaceId(){
  return new Promise(function(res){
    if(!webauthnAvailable()||!S().faceIdCred){res(false);return;}
    var chal=new Uint8Array(32);crypto.getRandomValues(chal);
    var raw=b64d(S().faceIdCred);
    navigator.credentials.get({publicKey:{
      challenge:chal, allowCredentials:[{type:'public-key',id:raw,transports:['internal']}],
      userVerification:'required', timeout:60000
    }}).then(function(){res(true);}).catch(function(){res(false);});
  });
}

   puis le code dans une fenêtre de 60 s ; passé ce délai on refait Face ID. ----- */

    html+='<div class="empty"><div class="em">🔐</div><p><b>Votre Safe est vide</b></p>'

  } else {
    html+='<div class="list">'+list.map(function(e){return entryCard(e,q?state.query.trim():'');}).join('')+'</div>';
  }
  view.innerHTML=html;

  $('addBtn').onclick=function(){openEditor(null);};

  view.querySelectorAll('[data-copy]').forEach(function(b){b.onclick=function(ev){
    ev.stopPropagation();

  };});

function changeUnlockMode(mode,sel){

    S().unlock='code'; S().faceIdCred=''; persist();

    render(); toast('Déverrouillage par code'); return;

  if(!webauthnAvailable()){ if(sel)sel.value=prev; toast('Face ID indisponible ici'); return; }
  if(S().faceIdCred){ // Face ID déjà enrôlé : simple bascule bio ↔ both
    S().unlock=mode; persist(); render();
    toast(mode==='both'?'Face ID + code activés':'Face ID activé'); return;
  }
  enrollFaceId(function(ok){                 // 1re activation : enrôlement Face ID
    if(ok){ S().unlock=mode; persist(); toast(mode==='both'?'Face ID + code activés':'Face ID activé'); }
    else if(sel){ sel.value=prev; }          // annulé : on remet le sélecteur sur l'ancien mode

/* ---------- Export / import ---------- */
function shareOrDownload(content,fname,mime,doneMsg){
  try{
    var file=new File([content],fname,{type:mime});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:fname})
        .then(function(){toast(doneMsg);}).catch(function(){});
      return;
    }
  }catch(e){}
  var blob=new Blob([content],{type:mime});
  var url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url; a.download=fname; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
  toast(doneMsg);
}
function exportData(){
  var data=JSON.stringify({app:'coffre',v:1,exportedAt:new Date().toISOString(),
    kdf:meta.kdf,wrapPin:meta.wrapPin,data:meta.data},null,2);
  shareOrDownload(data,'safe-'+todayStr()+'.json','application/json','Sauvegarde chiffrée exportée');
}
function exportTxt(){
  if(!entries.length){toast('Safe est vide');return;}
  if(!confirm('Exporter la liste EN CLAIR (lisible par quiconque ouvre le fichier) ?'))return;
  if(!confirm('Document très sensible. À imprimer puis supprimer, ou à ranger en lieu sûr. Continuer ?'))return;
  var d=new Date();
  var out='SAFE — mots de passe ('+d.toLocaleDateString('fr-FR')+')\n⚠️ DOCUMENT SENSIBLE — à conserver en lieu sûr\n\n';
  sortedEntries(entries).forEach(function(e){
    out+='■ '+e.name+(e.fav?' ⭐':'')+'  ['+CATS[catOf(e)].l+']\n';
    if(e.user)out+='   Identifiant : '+e.user+'\n';
    if(e.pwd)out+='   Mot de passe : '+e.pwd+'\n';
    if(e.url)out+='   Site : '+e.url+'\n';
    if(e.notes)out+='   Notes : '+e.notes.replace(/\n/g,'\n           ')+'\n';
    out+='\n';
  });
  shareOrDownload(out,'safe-liste-'+todayStr()+'.txt','text/plain','Liste exportée — manipulez-la avec soin');
}
function importData(ev){
  var file=ev.target.files[0]; if(!file)return;
  var r=new FileReader();
  r.onload=function(){
    try{
      var d=JSON.parse(r.result);
      if(!d||d.app!=='coffre'||!d.kdf||!d.kdf.salt||!d.wrapPin||typeof d.data!=='string')throw 0;
      pendingImport=d;
      $('app').classList.add('hidden');
      lockUI('import');
    }catch(x){toast('Fichier invalide');}
  };
  r.readAsText(file); ev.target.value='';
}
async function doImport(pin,d){
  var pk=await pinKeyRaw(pin,b64d(d.kdf.salt),+d.kdf.iter||ITER);
  var k2=await aDec(pk,d.wrapPin);            // lève si code faux
  var aes2=await importK(k2);
  var list=JSON.parse(td.decode(await aDec(aes2,d.data))).map(normEntry);
  var byId={}; entries.forEach(function(e){byId[e.id]=e;});
  var added=0,updated=0;
  list.forEach(function(e){
    var ex=byId[e.id];
    if(!ex){entries.push(e);byId[e.id]=e;added++;}
    else if(e.updatedAt>ex.updatedAt){Object.assign(ex,e);updated++;}
  });
  await saveEntries();
  return {added:added,updated:updated};
}
function wipeData(){
  if(!confirm('Effacer entièrement Safe (toutes les fiches et le code) ? Cette action est irréversible.'))return;
  if(!confirm('Vraiment tout supprimer ? Exportez d’abord une sauvegarde si besoin.'))return;
  localStorage.removeItem(KEY);
  try{indexedDB.deleteDatabase('coffre-bio');}catch(e){}
  location.reload();
}

    +'<div class="field"><label>Notes</label><textarea id="fNotes" placeholder="ex. question secrète, n° client…">'+esc(e.notes)+'</textarea></div>'

    +(isNew?'':'<button class="del-btn" id="fDel">Supprimer la fiche</button>')
    +'</div></div>';

  var cur={fav:e.fav,masked:true};
  setTimeout(function(){$('shBg').classList.add('show');$('sh').classList.add('show');},10);
  sheetOpen=true;

  function snap(){return [$('fName').value,$('fUser').value,$('fPwd').value,$('fUrl').value,$('fNotes').value,$('fCat').value,cur.fav?1:0].join('␀');}
  var initSnap=snap();
  function tryClose(){
    if(snap()!==initSnap&&!confirm('Abandonner les modifications ?'))return;
    closeSheet();
  }
  $('shBg').onclick=tryClose;
  $('shCancel').onclick=tryClose;
  var favSw=$('fFav'); favSw.onclick=function(){cur.fav=!cur.fav;favSw.classList.toggle('on',cur.fav);};
  var pwdIn=$('fPwd'), eyeBtn=$('fEye');

    cur.masked=!cur.masked;
    pwdIn.classList.toggle('masked',cur.masked);
    eyeBtn.innerHTML=svg(cur.masked?ICONS.eye:ICONS.eyeOff);
  };
  $('fGen').onclick=function(){
    if(pwdIn.value&&!confirm('Remplacer le mot de passe actuel par un nouveau ?'))return;
    pwdIn.value=genPwd(S().gen.len,S().gen);
    if(cur.masked)eyeBtn.click(); // on montre le mot de passe généré

    var name=$('fName').value.trim();
    var user=$('fUser').value.trim(), pwd=$('fPwd').value, url=$('fUrl').value.trim(), notes=$('fNotes').value.trim();
    // Garde anti-fiche-vide : uniquement à la création
    if(isNew&&!name&&!user&&!pwd){closeSheet();return;}
    if(!name){toast('Donnez un nom à cette fiche');return;}
    saving=true;
    var now=Date.now();
    if(isNew){
      e.name=name;e.user=user;e.pwd=pwd;e.url=url;e.notes=notes;
      e.cat=$('fCat').value;e.fav=cur.fav;e.createdAt=now;e.updatedAt=now;
      entries.push(e);
    } else {
      var real=entries.find(function(x){return x.id===e.id;});
      real.name=name;real.user=user;real.pwd=pwd;real.url=url;real.notes=notes;
      real.cat=$('fCat').value;real.fav=cur.fav;real.updatedAt=now;
    }

  if(del)del.onclick=async function(){
    if(!confirm('Supprimer cette fiche ?'))return;
    entries=entries.filter(function(x){return x.id!==e.id;});
    try{await saveEntries();}catch(x){toast('Erreur d’enregistrement');return;}
    closeSheet(); render(); toast('Fiche supprimée');
  };
}
function closeSheet(immediate){
  if(!sheetOpen)return; sheetOpen=false;
  var bg=$('shBg'),sh=$('sh');
  if(bg)bg.classList.remove('show'); if(sh)sh.classList.remove('show');
  if(immediate){$('sheetRoot').innerHTML='';return;}
  // Ne pas effacer si une nouvelle feuille a été rouverte entre-temps (< 300 ms).
  setTimeout(function(){if(!sheetOpen)$('sheetRoot').innerHTML='';},300);
}

function applyTheme(){
  var t=S().theme;
  document.documentElement.setAttribute('data-theme', t==='auto'?'':t);
  var mt=document.querySelector('meta[name=theme-color]');
  var dark = t==='dark' || (t==='auto' && window.matchMedia('(prefers-color-scheme:dark)').matches);
  if(mt)mt.setAttribute('content', dark?'#000000':'#f2f2f7');
}
var toastT;
function toast(msg){
  var el=$('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(function(){el.classList.remove('show');},2100);
}
document.addEventListener('visibilitychange',function(){
  if(!meta)return;
  if(document.hidden){hiddenAt=Date.now(); if(S().autoLock==='immediate')lockNow();}
  else if(unlocked){
    var lims={'30s':30000,'1min':60000,'5min':300000};
    var lim=lims[S().autoLock]||0;
    if(lim&&Date.now()-hiddenAt>lim)lockNow();
  }
});

function init(){
  applyTheme();
  window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',applyTheme);
  if(navigator.storage&&navigator.storage.persist)navigator.storage.persist().catch(function(){});
  if('serviceWorker' in navigator && location.protocol==='https:')
    navigator.serviceWorker.register('sw.js').catch(function(){});
  $('ibClose').onclick=function(){
    S().installDismissed=true; if(meta)persist();
    $('installBanner').classList.add('hidden');
  };
  if(!cryptoOK){
    $('lockHint').innerHTML='⚠️ Le chiffrement n’est pas disponible ici.<br>Ouvrez l’app en HTTPS ou installée sur l’écran d’accueil.';
    $('keypad').innerHTML=''; $('dots').innerHTML='';
    return;
  }
  if(corrupt){
    $('lockTitle').textContent='Safe';
    $('lockHint').innerHTML='⚠️ Données illisibles ou incomplètes.<br>Réinitialisez Safe (les fiches actuelles seront perdues), puis réimportez une sauvegarde si vous en avez une.';
    $('keypad').innerHTML=''; $('dots').innerHTML='';
    var rb=$('lockForgot'); rb.textContent='Réinitialiser Safe'; rb.classList.remove('hidden');
    return;
  }
  if(!meta){
    lockUI('setup'); // premier lancement : création du code puis du coffre
  } else {
    lockUI('unlock');
    if(S().unlock==='bio'&&S().faceIdCred&&webauthnAvailable())setTimeout(tryFaceId,350);
  }
}
init();
</script>
</body>
